security:
    password_hashers:
        App\Entity\User:
            algorithm: argon2id

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        api_token:
            pattern: ^/api/v1/
            stateless: true
            # ApiTokenAuthenticator ajouté en Story 2.x
        admin_session:
            pattern: ^/api/admin/
            lazy: true
            provider: app_user_provider
            context: gift_admin
            form_login:
                login_path: /api/admin/login
                check_path: /api/admin/login
            logout:
                path: /api/admin/logout

    access_control:
        - { path: ^/api/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/admin/, roles: ROLE_ADMIN }
        - { path: ^/api/v1/, roles: PUBLIC_ACCESS }
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            App\Entity\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
