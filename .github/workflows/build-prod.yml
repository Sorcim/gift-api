name: Build Production

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      APP_ENV: test
      APP_SECRET: changeme-test-secret-minimum-32-chars
      DATABASE_URL: postgresql://app:test_password@127.0.0.1:5432/app_test?serverVersion=16&charset=utf8
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, intl, zip
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  build-push:
    needs: [lint-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frankenphp/Dockerfile
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/gift-api:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/gift-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
